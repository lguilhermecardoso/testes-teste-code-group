<div class="profile-card">

    <img class="js-avatar" alt="" />
    <div>
      <div class="username js-name"></div>
      <div class="js-login text-muted" style="font-size: 0.85rem"></div>
    </div>
  </div>
  <p class="bio js-bio"></p>
  <div class="d-flex flex-wrap gap-3">
    <span class="stat-item">
      <i class="bi bi-people me-1"></i>

    <span class="stat-item">
      <i class="bi bi-person-check me-1"></i>
      <strong class="js-following"></strong> seguindo

    <span class="stat-item js-email-wrapper">
      <i class="bi bi-envelope me-1"></i>
