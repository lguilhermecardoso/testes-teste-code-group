<div class="repo-detail-card">
  <div class="d-flex align-items-center gap-2 mb-1">
    <img class="js-owner-avatar" alt="" style="width:28px;height:28px;border-radius:50%" />
    <span class="text-muted js-owner-login" style="font-size:0.9rem"></span>
  </div>
  <h2 class="repo-title mb-2 js-repo-name"></h2>
  <p class="text-muted mb-3 js-repo-desc"></p>
  <div class="d-flex flex-wrap gap-2 mb-4 js-stats"></div>
  <a class="btn btn-dark js-repo-link" target="_blank" rel="noopener noreferrer">
    <span class="js-link-label"></span>
  </a>
</div>
